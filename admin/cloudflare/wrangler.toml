name = "poker-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "poker-db"
database_id = "YOUR_D1_DATABASE_ID"

# Durable Objects for real-time game state
[[durable_objects.bindings]]
name = "POKER_ROOM"
class_name = "PokerRoom"

[[migrations]]
tag = "v1"
new_classes = ["PokerRoom"]
